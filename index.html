        // Populate Select
        const select = document.getElementById('metricSelect');
        Object.keys(chartData).forEach(metric => {
            let option = document.createElement('option');
            option.value = metric;
            option.text = metric;
            select.appendChild(option);
        });

        // Register Datalabels plugin
        Chart.register(ChartDataLabels);

        let myChart;

        function initChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const initialMetric = Object.keys(chartData)[0];
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: initialMetric,
                        data: chartData[initialMetric],
                        backgroundColor: 'rgba(52, 152, 219, 0.7)',
                        borderColor: 'rgba(41, 128, 185, 1)',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: initialMetric,
                            font: {
                                size: 20,
                                family: "'Prompt', sans-serif"
                            }
                        },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            formatter: function(value, context) {
                                // check if the metric implies percentage
                                const metricName = document.getElementById('metricSelect').value;
                                if(metricName.includes('ร้อยละ') || metricName.includes('อายุ')) {
                                    return value + (metricName.includes('ร้อยละ') ? '%' : '');
                                }
                                return value.toLocaleString(); // Add commas to numbers
                            },
                            font: {
                                weight: 'bold',
                                size: 14,
                                family: "'Prompt', sans-serif"
                            },
                            color: '#2c3e50'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'จำนวน / ร้อยละ',
                                font: {
                                    size: 14,
                                    family: "'Prompt', sans-serif"
                                }
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 14,
                                    family: "'Prompt', sans-serif"
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateChart() {
            const selectedMetric = document.getElementById('metricSelect').value;
            myChart.data.datasets[0].data = chartData[selectedMetric];
            myChart.options.plugins.title.text = selectedMetric;
            
            // Adjust Y-axis title based on selection
            if(selectedMetric.includes('ร้อยละ')) {
                myChart.options.scales.y.title.text = 'ร้อยละ (%)';
            } else if(selectedMetric.includes('อายุ')) {
                 myChart.options.scales.y.title.text = 'ปี';
            } else {
                myChart.options.scales.y.title.text = 'จำนวน (คน)';
            }

            myChart.update();
        }

        // Initialize on load
        window.onload = initChart;
    </script>
