<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCD Dashboard - โรงพยาบาลนครพิงค์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root {
            --primary: #00796B;
            --primary-light: #B2DFDB;
            --secondary: #004D40;
            --bg-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        main {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .upload-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 50px;
            border: 2px dashed var(--primary-light);
        }

        .dashboard-container {
            display: none; /* ซ่อนไว้จนกว่าจะอัปโหลดไฟล์ */
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            flex: 1;
            min-width: 300px;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--secondary);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .chart-container {
            position: relative;
            height: 60vh;
            width: 100%;
        }

        .breadcrumb {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        footer {
            background-color: var(--secondary);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            margin-top: auto;
        }

        .file-input-wrapper {
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>สรุปข้อมูลการให้บริการ NCD โรงพยาบาลนครพิงค์ ปีงบประมาณ 2569</h1>
    </header>

    <main>
        <div class="upload-section" id="uploadSection">
            <h2>อัปโหลดไฟล์ข้อมูลเพื่อเริ่มต้น</h2>
            <p style="color: var(--text-muted);">กรุณาเลือกไฟล์ <b>patient_full_71_kpis_v3.csv</b> ที่ดาวน์โหลดมา</p>
            <div class="file-input-wrapper">
                <input type="file" id="csvFileInput" accept=".csv" style="font-size: 16px;">
            </div>
        </div>

        <div class="dashboard-container" id="dashboardSection">
            <div class="controls">
                <select id="kpiSelector"></select>
                <button id="backBtn" style="display: none;">
                    &#8592; ย้อนกลับ
                </button>
            </div>
            <div class="breadcrumb" id="breadcrumbText">ระดับ: ภาพรวมทั้งหมด</div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </main>

    <footer>
        จัดทำโดย คณะกรรมการ NCD โรงพยาบาลนครพิงค์
    </footer>

    <script>
        let rawData = [];
        let kpiList = [];
        let currentKpi = "";
        let chartInstance = null;
        
        // Navigation State
        let navStack = []; // เก็บประวัติการกดเพื่อย้อนกลับ

        // Elements
        const csvFileInput = document.getElementById('csvFileInput');
        const uploadSection = document.getElementById('uploadSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const kpiSelector = document.getElementById('kpiSelector');
        const backBtn = document.getElementById('backBtn');
        const breadcrumbText = document.getElementById('breadcrumbText');
        const ctx = document.getElementById('myChart').getContext('2d');

        // สีสำหรับกราฟแท่ง
        const colors = [
            'rgba(0, 121, 107, 0.8)', 'rgba(0, 150, 136, 0.8)', 'rgba(38, 166, 154, 0.8)', 
            'rgba(77, 182, 172, 0.8)', 'rgba(128, 203, 196, 0.8)', 'rgba(3, 169, 244, 0.8)',
            'rgba(2, 136, 209, 0.8)', 'rgba(255, 152, 0, 0.8)', 'rgba(245, 124, 0, 0.8)'
        ];

        // 1. อ่านไฟล์ CSV
        csvFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    initializeDashboard();
                }
            });
        });

        // 2. ตั้งค่าเริ่มต้นให้ Dashboard
        function initializeDashboard() {
            // ดึงชื่อ KPI (คอลัมน์ที่ 4 เป็นต้นไป)
            const columns = Object.keys(rawData[0]);
            kpiList = columns.slice(3);
            
            // นำ KPI ใส่ใน Dropdown
            kpiSelector.innerHTML = '';
            kpiList.forEach(kpi => {
                let option = document.createElement('option');
                option.value = kpi;
                option.textContent = kpi;
                kpiSelector.appendChild(option);
            });

            currentKpi = kpiList[0];
            uploadSection.style.display = 'none';
            dashboardSection.style.display = 'block';

            // โหลดกราฟระดับที่ 1 (ภาพใหญ่)
            loadLevel1();
        }

        // เมื่อเปลี่ยน KPI
        kpiSelector.addEventListener('change', function(e) {
            currentKpi = e.target.value;
            // รีเซ็ตการเจาะลึก กลับไปหน้าแรกสุด
            navStack = [];
            loadLevel1();
        });

        // ปุ่มย้อนกลับ
        backBtn.addEventListener('click', function() {
            navStack.pop(); // เอาสถานะปัจจุบันออก
            if (navStack.length === 0) {
                loadLevel1();
            } else {
                const previousState = navStack[navStack.length - 1];
                if (previousState.level === 2) {
                    loadLevel2(previousState.macroGroup);
                }
                // (ถ้ามีลึกกว่านี้ก็เพิ่มเงื่อนไข)
            }
        });

        // แปลงค่าจาก string ("75.2%") ให้เป็นตัวเลขสำหรับวาดกราฟ
        function parseValue(valStr) {
            if(!valStr) return 0;
            let cleanStr = valStr.toString().replace('%', '').replace(/,/g, '');
            let num = parseFloat(cleanStr);
            return isNaN(num) ? 0 : num;
        }

        // เช็คว่า KPI นี้เป็นร้อยละหรือไม่ (เพื่อใส่แกน Y ให้ถูกต้อง)
        function isPercentage() {
            return currentKpi.includes('ร้อยละ');
        }

        // --- ฟังก์ชันวาดกราฟหลัก ---
        function renderChart(labels, dataValues, levelObj) {
            if (chartInstance) {
                chartInstance.destroy();
            }

            // จัดการสี
            const bgColors = labels.map((_, i) => colors[i % colors.length]);

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: currentKpi,
                        data: dataValues,
                        backgroundColor: bgColors,
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let val = context.raw.toLocaleString();
                                    return isPercentage() ? val + '%' : val + ' คน/ครั้ง';
                                }
                            },
                            titleFont: { family: 'Prompt', size: 14 },
                            bodyFont: { family: 'Prompt', size: 14 }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: isPercentage() ? 100 : undefined,
                            ticks: {
                                font: { family: 'Prompt' },
                                callback: function(value) {
                                    return isPercentage() ? value + '%' : value.toLocaleString();
                                }
                            }
                        },
                        x: {
                            ticks: { font: { family: 'Prompt', size: 13 } }
                        }
                    },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const clickedLabel = labels[index];
                            handleBarClick(clickedLabel, levelObj);
                        }
                    }
                }
            });
        }

        // --- ลอจิกการกดแท่งกราฟ (Drill-down) ---
        function handleBarClick(clickedLabel, levelObj) {
            if (levelObj.level === 1) {
                // กดที่ระดับ 1 -> ไประดับ 2
                navStack.push({ level: 2, macroGroup: clickedLabel });
                loadLevel2(clickedLabel);
            } else if (levelObj.level === 2) {
                // กดที่ระดับ 2 -> ไประดับ 3
                navStack.push({ level: 3, macroGroup: levelObj.macroGroup, mainGroup: clickedLabel });
                loadLevel3(levelObj.macroGroup, clickedLabel);
            }
            // ถ้าระดับ 3 จะไม่เจาะลึกลงไปอีก
        }

        // --- ระดับ 1: ภาพใหญ่ (Macro) ---
        function loadLevel1() {
            backBtn.style.display = 'none';
            breadcrumbText.innerHTML = '<b>ระดับ 1:</b> ภาพรวมทั้งหมดคลิกที่แท่งเพื่อดูรายละเอียด';
            
            // กรองข้อมูลเฉพาะแถวที่เป็นภาพใหญ่รวม
            const filteredData = rawData.filter(row => row['กลุ่มใหญ่'] === 'รวมภาพใหญ่');
            
            const labels = filteredData.map(row => row['กลุ่มภาพใหญ่']);
            const dataValues = filteredData.map(row => parseValue(row[currentKpi]));

            renderChart(labels, dataValues, { level: 1 });
        }

        // --- ระดับ 2: แยกรายกลุ่มใหญ่ (Major Group) ---
        function loadLevel2(macroGroup) {
            backBtn.style.display = 'block';
            breadcrumbText.innerHTML = `<b>ระดับ 2:</b> กลุ่ม ${macroGroup} > คลิกที่แท่งเพื่อดูคลินิกย่อย`;

            // กรอง: หาข้อมูลที่กลุ่มภาพใหญ่ตรงกัน และกลุ่มย่อยขึ้นต้นด้วย "รวม (" (แปลว่าเป็นผลรวมของกลุ่มใหญ่นั้นๆ)
            let filteredData = rawData.filter(row => 
                row['กลุ่มภาพใหญ่'] === macroGroup && 
                row['กลุ่มย่อย'].startsWith('รวม (')
            );

            // เรียงลำดับจากมากไปน้อย
            filteredData.sort((a, b) => parseValue(b[currentKpi]) - parseValue(a[currentKpi]));

            const labels = filteredData.map(row => row['กลุ่มใหญ่']);
            const dataValues = filteredData.map(row => parseValue(row[currentKpi]));

            renderChart(labels, dataValues, { level: 2, macroGroup: macroGroup });
        }

        // --- ระดับ 3: แยกรายคลินิก (Micro Group) ---
        function loadLevel3(macroGroup, mainGroup) {
            backBtn.style.display = 'block';
            breadcrumbText.innerHTML = `<b>ระดับ 3:</b> ${macroGroup} > แผนก ${mainGroup}`;

            // กรอง: หาข้อมูลที่แผนกตรงกัน และไม่ใช่แถวผลรวม
            let filteredData = rawData.filter(row => 
                row['กลุ่มภาพใหญ่'] === macroGroup &&
                row['กลุ่มใหญ่'] === mainGroup &&
                !row['กลุ่มย่อย'].startsWith('รวม (') &&
                row['กลุ่มย่อย'] !== 'รวมภาพใหญ่'
            );

            // เรียงลำดับจากมากไปน้อย
            filteredData.sort((a, b) => parseValue(b[currentKpi]) - parseValue(a[currentKpi]));

            const labels = filteredData.map(row => row['กลุ่มย่อย']);
            const dataValues = filteredData.map(row => parseValue(row[currentKpi]));

            renderChart(labels, dataValues, { level: 3 });
        }
    </script>
</body>
</html>
